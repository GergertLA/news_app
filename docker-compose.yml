version: "3.9"

services:
  db:
    image: postgres:15
    container_name: news_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: news
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: news_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://user:password@db:5432/news

  frontend:
    build: ./frontend
    container_name: news_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata: