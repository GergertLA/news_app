name: CI / Build Docker

# Триггер: на пуш или PR в main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      # PostgreSQL для тестов
      db:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: news
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Клонируем репозиторий
      - uses: actions/checkout@v3

      # 2. Устанавливаем Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      # 3. Сборка backend
      - name: Build backend Docker image
        run: |
          docker build -t news_app-backend ./backend

      # 4. Сборка frontend
      - name: Build frontend Docker image
        run: |
          docker build -t news_app-frontend ./frontend

      # 5. (Опционально) Запуск тестов backend
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend tests
        run: |
          pytest tests/